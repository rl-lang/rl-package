name: rl-package
description: Package a .rl file into self-contained binaries for Linux, macOS, and Windows

inputs:
  file:
    description: Path to the .rl source file (relative to calling repo root)
    required: true
  output:
    description: Output binary name (without extension)
    required: false
    default: program
  version:
    description: rl-cli version to install from crates.io (e.g. 0.1.4). Defaults to the latest published version.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout calling repo
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache rl-cli install
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin
        key: rl-cli-${{ runner.os }}-${{ inputs.version || 'latest' }}

    - name: Install rl-cli
      shell: bash
      run: |
        if command -v rl >/dev/null 2>&1; then
          echo "Using cached rl-cli: $(rl --version)"
        elif [ -n "${{ inputs.version }}" ]; then
          cargo install rl-cli --version "${{ inputs.version }}" --locked
        else
          cargo install rl-cli --locked
        fi

    - name: Create output dir
      shell: bash
      run: mkdir -p bin

    - name: Package (Linux/macOS)
      shell: bash
      if: runner.os != 'Windows'
      run: rl package "${{ inputs.file }}" -o "bin/${{ inputs.output }}"

    - name: Package (Windows)
      shell: pwsh
      if: runner.os == 'Windows'
      run: rl package "${{ inputs.file }}" -o "bin\${{ inputs.output }}.exe"

    - name: Upload Linux/macOS artifact
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.output }}-${{ runner.os }}
        path: bin/${{ inputs.output }}

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.output }}-windows
        path: bin\${{ inputs.output }}.exe
